version: "3.8"

services:
  compliance-ledger:
    image: ghcr.io/kingsleyonoh/financial-compliance-ledger:latest
    env_file:
      - .env
    depends_on:
      - postgres
      - nats
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.compliance-ledger.rule=Host(`compliance.kingsleyonoh.com`)"
      - "traefik.http.routers.compliance-ledger.entrypoints=websecure"
      - "traefik.http.routers.compliance-ledger.tls.certresolver=letsencrypt"
      - "traefik.http.services.compliance-ledger.loadbalancer.server.port=8080"
    networks:
      - web
      - internal

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: fcl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: compliance_ledger
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - internal

  nats:
    image: nats:latest
    command: ["--js"]
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - internal

volumes:
  postgres_data:

networks:
  web:
    external: true
  internal:
