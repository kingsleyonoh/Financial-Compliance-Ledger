version: "3.8"

services:
  compliance-ledger:
    image: ghcr.io/kingsleyonoh/financial-compliance-ledger:latest
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres
      - nats
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.compliance-ledger.rule=Host(`compliance.kingsleyonoh.com`)"
      - "traefik.http.routers.compliance-ledger.entrypoints=websecure"
      - "traefik.http.routers.compliance-ledger.tls.certresolver=letsencrypt"
      - "traefik.http.services.compliance-ledger.loadbalancer.server.port=8080"
    networks:
      - web
      - internal

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: fcl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: compliance_ledger
    restart: always
    networks:
      - internal

  nats:
    image: nats:latest
    command: ["--js"]
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: always
    networks:
      - internal

volumes:
  postgres_data:

networks:
  web:
    external: true
  internal:
